            `;

            window["sortDir_" + type] = 1; // 1 asc, -1 desc
            window["sortCol_" + type] = '';
            
            renderAdvTableRows(type);
        }

        function sortAdvTable(type, colKey) {
            if (window["sortCol_" + type] === colKey) {
                window["sortDir_" + type] *= -1; // toggle dir
            } else {
                window["sortCol_" + type] = colKey;
                window["sortDir_" + type] = 1;
            }
            renderAdvTableRows(type);
        }

        function renderAdvTableRows(type) {
            const tbody = document.getElementById('advTbody_' + type);
            if (!tbody) return;

            let data = db[type].map((item, index) => ({ ...item, _origIdx: index }));

            // 1. Enrich data
            data = data.map(item => {
                const c = db.customers.find(x => x.name === item.customerName) || {};
                return { ...item, rep: item.rep || c.rep || '-', area: item.area || c.area || '-' };
            });

            // 3. Search & Range Filters
            const searchStr = document.getElementById('advSearch_' + type)?.value.toLowerCase() || '';
            const fromD = document.getElementById('advFrom_' + type)?.value;
            const toD = document.getElementById('advTo_' + type)?.value;

            if (searchStr) {
                data = data.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(searchStr)));
            }
            if (fromD) data = data.filter(i => i.date >= fromD);
            if (toD) data = data.filter(i => i.date <= toD);
            
            // Column-specific filters
            const headersConfig = {
                'sales': ['invoiceNo', 'date', 'customerName', 'rep', 'area', 'total'],
                'returns': ['date', 'customerName', 'rep', 'area', 'notes', 'amount'],
                'payments': ['date', 'customerName', 'rep', 'area', 'no', 'amount']
            };
            const currentHeaders = headersConfig[type] || [];
            currentHeaders.forEach(k => {
                const colFVal = document.getElementById(`advColFilter_${type}_${k}`)?.value.toLowerCase() || '';
                if (colFVal) {
                    data = data.filter(item => String(item[k] || '').toLowerCase().includes(colFVal));
                }
            });

            // 4. Sort
            const sCol = window["sortCol_" + type];
            const sDir = window["sortDir_" + type];
            if (sCol) {
                data.sort((a, b) => {
                    let vA = a[sCol], vB = b[sCol];
                    if (sCol === 'date') return (new Date(vA) - new Date(vB)) * sDir;
                    if (!isNaN(parseFloat(vA)) && !isNaN(parseFloat(vB)) && String(vA).match(/^-?\d*\.?\d+$/) && String(vB).match(/^-?\d*\.?\d+$/)) {
                        return (parseFloat(vA) - parseFloat(vB)) * sDir;
                    }
                    return String(vA).localeCompare(String(vB)) * sDir;
                });
            }

            const config = {
                'sales': [{k:'invoiceNo',l:'رقم الفاتورة'},{k:'date', fn: formatDate, l:'التاريخ'},{k:'customerName', l:'العميل'},{k:'rep', l:'المندوب'},{k:'area', l:'المنطقة'},{k:'total', fn: v => v ? parseFloat(v).toLocaleString() : '0', l:'القيمة'}],
                'returns': [{k:'date', fn: formatDate, l:'التاريخ'},{k:'customerName', l:'العميل'},{k:'rep', l:'المندوب'},{k:'area', l:'المنطقة'},{k:'notes', l:'البيان'},{k:'amount', fn: v => v ? parseFloat(v).toLocaleString() : '0', l:'القيمة'}],
                'payments': [{k:'date', fn: formatDate, l:'التاريخ'},{k:'customerName', l:'العميل'},{k:'rep', l:'المندوب'},{k:'area', l:'المنطقة'},{k:'no', l:'البيان'},{k:'amount', fn: v => v ? parseFloat(v).toLocaleString() : '0', l:'القيمة'}]
            };

            let sumValue = 0;
            const uniqueCustomers = new Set();
            
            tbody.innerHTML = data.map((item) => {
                const origIndex = item._origIdx;
                uniqueCustomers.add(item.customerName);
                sumValue += parseFloat(item.total || item.amount || 0);

                let cells = config[type].map(col => {
                    let val = item[col.k] !== undefined ? item[col.k] : '';
                    if (col.fn) val = col.fn(val);
                    
                    // Clean display value (remove # and handle undefined)
                    const displayVal = String(val || '-').replace('#', '');
                    let tdClass = `td-${col.k}`;
                    if (col.k === 'customerName') tdClass += ' col-customer';
                    if (['total', 'amount'].includes(col.k)) tdClass += ' col-val';
                    if (col.k === 'date') tdClass += ' col-date';
                    if (col.k === 'invoiceNo') tdClass += ' col-no';
                    if (col.k === 'rep') tdClass += ' col-rep';
                    if (col.k === 'area') tdClass += ' col-area';
                    if (['paymentMethod', 'pm'].includes(col.k)) tdClass += ' col-pm';
                    if (['notes', 'no'].includes(col.k)) tdClass += ' col-details';

                    let content = displayVal;
                    if (col.k === 'customerName') {
                        content = `<div class="flex items-center justify-between gap-2">
                                    <span>${displayVal}</span>
                                    <button onclick="showCustomerMenu(event, '${displayVal}')" class="text-slate-400 hover:text-blue-600 no-print"><i class="fas fa-caret-down"></i></button>
                                   </div>`;
                    }

                    return `<td class="px-2 py-1 border border-slate-300 ${tdClass}">${content}</td>`;
                }).join('');

                return `
                    <tr class="hover:bg-blue-50/40 transition border-b border-slate-300 group text-center" style="height: 20px;">
                        ${cells}
                        <td class="px-2 py-1 text-center no-print border border-slate-300">
                            <div class="flex justify-center gap-1 opacity-10 md:opacity-100 transition group-hover:opacity-100">
                                <button onclick="toggleRowDetails('${type}', ${origIndex}, this)" class="text-indigo-500 p-1 hover:bg-indigo-100 rounded transition"><i class="fas fa-eye text-xs"></i></button>
                                <button onclick="editItem('${type}', ${origIndex})" class="text-blue-500 p-1 hover:bg-blue-100 rounded transition"><i class="fas fa-edit text-xs"></i></button>
                                <button onclick="deleteItem('${type}', ${origIndex})" class="text-red-500 p-1 hover:bg-red-100 rounded transition"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        </td>
                    </tr>
                    <tr id="details_${type}_${origIndex}" class="hidden bg-slate-50 border-b border-slate-300 shadow-inner no-print">
                        <td colspan="100%" class="p-4">
                            <div class="max-w-xl mx-auto bg-white p-4 rounded-lg border border-slate-200">
                                <h4 class="font-bold text-slate-800 mb-2 border-b pb-1">تفاصيل المستند</h4>
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    ${config[type].map(c => `<div><span class="text-slate-400">${c.l}:</span> <span class="font-bold">${item[c.k]}</span></div>`).join('')}
                                </div>
                                <div class="flex gap-2 mt-4 pt-2 border-t">
                                    <button class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
                                    <button class="bg-emerald-600 text-white px-3 py-1 rounded text-xs font-bold" onclick="shareData('${type}')"><i class="fas fa-share-alt"></i> مشاركة</button>
                                    ${type === 'sales' ? `
                                    <button class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded text-xs font-bold mr-auto" onclick="quickActionFromInvoice('returns', ${origIndex})"><i class="fas fa-undo"></i> عمل مرتجع</button>
                                    <button class="bg-teal-600 hover:bg-teal-700 text-white px-3 py-1 rounded text-xs font-bold" onclick="quickActionFromInvoice('payments', ${origIndex})"><i class="fas fa-hand-holding-usd"></i> تسديد الفاتورة</button>
                                    ` : ''}
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            const tfoot = document.getElementById('advTfoot_' + type);
            if(tfoot) {
                const totalIndex = config[type].findIndex(c => ['total', 'amount'].includes(c.k));
                const allCells = config[type].map((col, idx) => {
                    if (idx < totalIndex) {
                        return `<td class="px-2 py-1 border border-slate-300 text-right">${idx === 0 ? 'الإجمالي المجمع' : '-'}</td>`;
                    } else if (idx === totalIndex) {
                        return `<td class="px-2 py-1 text-center text-lg border border-slate-300 font-bold">${sumValue.toLocaleString()}</td>`;
                    } else {
                        return `<td class="px-2 py-1 border border-slate-300">-</td>`;
                    }
                }).join('');
                tfoot.innerHTML = `
                    <tr class="bg-slate-100 border-t-2 border-slate-900 font-bold">
                        ${allCells}
                        <td class="no-print px-2 py-1 border border-slate-300"></td>
                    </tr>
                `;
            }

            const footers = document.getElementById('advFooters_' + type);
            if (footers) {
                footers.innerHTML = `
                    <div class="flex items-center gap-2">إجمالي العمليات: ${data.length}</div>
                    <div class="flex items-center gap-2">إجمالي العملاء: ${uniqueCustomers.size}</div>
                    <div class="flex items-center gap-2 text-blue-700 font-bold">إجمالي القيمة: ${sumValue.toLocaleString()}</div>
                `;
            }
        }

        function toggleRowDetails(type, origIndex, btn) {
            const tr = document.getElementById(`details_${type}_${origIndex}`);
            if (tr.classList.contains('hidden')) {
                // hide all other opened details in this table
                document.querySelectorAll(`[id^="details_${type}_"]`).forEach(el => el.classList.add('hidden'));
                document.querySelectorAll(`.fa-eye-slash`).forEach(icon => { icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); });
                
                tr.classList.remove('hidden');
                btn.querySelector('i').classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                tr.classList.add('hidden');
                btn.querySelector('i').classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function shareData(type) {
            let data = [];
            let reportTitle = "";
            let summaryText = "";

            if (type === 'customers') {
                reportTitle = 'العملاء';
                const rows = document.querySelectorAll('#customersTableBody tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 6) {
                        data.push({ code: cells[0].innerText, name: cells[1].innerText, rep: cells[2].innerText, debt: cells[5].innerText });
                    }
                });
                const footRow = document.querySelector('#custTfoot tr');
                if (footRow) summaryText = `\nإجمالي المديونية المعروض: ${footRow.querySelectorAll('td')[1].innerText}`;
            } else if (['sales', 'returns', 'payments'].includes(type)) {
                reportTitle = type === 'sales' ? 'المبيعات' : type === 'returns' ? 'المرتجعات' : 'التحصيل';
                const rows = document.querySelectorAll(`#advTbody_${type} tr`);
                rows.forEach(row => {
                    if (!row.classList.contains('hidden')) {
                        const cells = row.querySelectorAll('td');
                        if (cells.length >= 5) {
                            data.push({ c1: cells[0].innerText, c2: cells[1].innerText, c3: cells[2].innerText, val: cells[cells.length - 1].innerText });
                        }
                    }
                });
                const footRow = document.querySelector(`#advTfoot_${type} tr`);
                if (footRow) summaryText = `\n${footRow.querySelectorAll('td')[1].innerText}`;
            } else {
                data.push({ message: 'بيانات غير متاحة للمشاركة حالياً' });
                reportTitle = 'تقرير';
            }

            if (data.length === 0) { showToast('لا توجد بيانات للمشاركة'); return; }

            let text = `*شركة ابن خلدون لتجارة وتوزيع الأدوية*\n*تقرير ${reportTitle}*\n`;
            text += `بتاريخ: ${formatDate(new Date())}\n`;
            text += `--------------------------\n`;
            data.forEach(x => { text += `• ${Object.values(x).join(' | ')}\n`; });
            text += `--------------------------${summaryText}\n`;
            text += `شركة ابن خلدون لتجارة وتوزيع الأدوية`;

            const encoded = encodeURIComponent(text);
            const isWA = confirm("مشاركة عبر واتساب؟ (نعم لواتساب / لا لتليجرام)");
            const url = isWA ? `https://api.whatsapp.com/send?text=${encoded}` : `https://t.me/share/url?url=&text=${encoded}`;
            window.open(url, '_blank');
        }

        function addToCart(itemNo) {
            const item = db.inventory.find(i => i.no === itemNo);
            if (item && item.qty > 0) {
                window.posCart.push(item);
                updatePOSCart();
            } else {
                alert('الصنف غير متوفر');
            }
        }

        function updatePOSCart() {
            const tbody = document.getElementById('posCart');
            let total = 0;
            tbody.innerHTML = window.posCart.map((item, idx) => {
                total += parseFloat(item.price);
                return `<tr><td>${item.name}</td><td>${item.price}</td><td><button onclick="window.posCart.splice(${idx},1); updatePOSCart()" class="text-red-400">x</button></td></tr>`;
            }).join('');
            document.getElementById('posTotal').innerText = total.toFixed(2);
            document.getElementById('posCount').innerText = window.posCart.length;
        }

        function processPOSSale() {
            if (window.posCart.length === 0) return;
            const total = window.posCart.reduce((s, i) => s + parseFloat(i.price), 0);
            // Deduct Stock
            window.posCart.forEach(c => {
                const invItem = db.inventory.find(i => i.no === c.no);
                if (invItem) invItem.qty--;
            });
            // Add Sale
            db.sales.push({
                invoiceNo: 'POS-' + Date.now(),
                customerName: 'عميل نقدي',
                date: new Date().toISOString().split('T')[0],
                total: total,
                type: 'Cash',
                rep: '-',
                area: '-',
                createdBy: currentUser.id
            });
            saveData();
            showToast('تم البيع بنجاح');
            window.posCart = [];
            updatePOSCart();
            navigateTo('pharmacy_sales'); // Refresh
        }

        function sortCustomersTable(colKey) {
            if (window.sortCustCol === colKey) {

        function applyCustomerFilters() {
            const searchAll = document.getElementById('custTitleFilter')?.value.toLowerCase() || '';
            const fromD = document.getElementById('custFromDate')?.value;
            const toD = document.getElementById('custToDate')?.value;
            const debtF = parseFloat(document.getElementById('custDebtFrom')?.value) || -Infinity;
            const debtT = parseFloat(document.getElementById('custDebtTo')?.value) || Infinity;

            let filtered = db.customers.map((c, idx) => {
                // Calculate debt dynamically to cache for sorting/filtering
                const debtNum = parseFloat(calculateBalance(c.name).replace(/,/g, '')) || 0;
                return { ...c, _debt: debtNum, _origIdx: idx };
            });

            filtered = filtered.filter(c => {
                const fNo = document.getElementById('custCol_no')?.value.toLowerCase();
                const fName = document.getElementById('custCol_name')?.value.toLowerCase();
                const fRep = document.getElementById('custCol_rep')?.value.toLowerCase();
                const fArea = document.getElementById('custCol_area')?.value.toLowerCase();
                const fPm = document.getElementById('custCol_pm')?.value.toLowerCase();

                if (fNo && !String(c.no).toLowerCase().includes(fNo)) return false;
                if (fName && !String(c.name).toLowerCase().includes(fName)) return false;
                if (fRep && !String(c.rep || '').toLowerCase().includes(fRep)) return false;
                if (fArea && !String(c.area || '').toLowerCase().includes(fArea)) return false;
                if (fPm && !String(c.paymentMethod || '').toLowerCase().includes(fPm)) return false;

                const matchFrom = !fromD || (c.date && c.date >= fromD);
                const matchTo = !toD || (c.date && c.date <= toD);
                const matchDebt = c._debt >= debtF && c._debt <= debtT;
                const matchAll = !searchAll || [c.name, c.rep, c.area].some(v => String(v || '').toLowerCase().includes(searchAll));

                return matchFrom && matchTo && matchDebt && matchAll;
            });

            const totalFDebt = filtered.reduce((a, b) => a + (b._debt || 0), 0);

            // Sorting
            const sCol = window.sortCustCol;
            const sDir = window.sortCustDir;
            if (sCol) {
                filtered.sort((a, b) => {
                    let vA = a[sCol];
                    let vB = b[sCol];
                    if (sCol === 'date') return (new Date(vA) - new Date(vB)) * sDir;
                    if (sCol === '_debt' || sCol === 'no') { // Try numeric sort exactly
                        vA = parseFloat(vA) || 0;
                        vB = parseFloat(vB) || 0;
                        return (vA - vB) * sDir;
                    }
                    if (!isNaN(parseFloat(vA)) && !isNaN(parseFloat(vB)) && String(vA).match(/^-?\d*\.?\d+$/) && String(vB).match(/^-?\d*\.?\d+$/)) {
                        return (parseFloat(vA) - parseFloat(vB)) * sDir;
                    }
                    return String(vA).localeCompare(String(vB)) * sDir;
                });
            }

            document.getElementById('customersTableBody').innerHTML = renderCustomerRowsFiltered(filtered);

            // Update Customers Footer
            // Update Table Footers (In-Grid)
            const custTfoot = document.getElementById('custTfoot');
            if(custTfoot) {
                custTfoot.innerHTML = `
                    <tr class="bg-slate-100 border-t-2 border-slate-900 font-bold">
                        <td colspan="5" class="p-3 text-right">إجمالي المديونية للأرصدة المعروضة (${filtered.length} عملاء)</td>
                        <td class="p-3 text-lg ${totalFDebt > 0 ? 'text-red-600' : 'text-emerald-700'}">${totalFDebt.toLocaleString()}</td>
                        <td class="no-print"></td>
                        <td class="no-print"></td>
                    </tr>
                `;
            }

            // Update Customers Summary (Bottom Sidebar View)
            const custFooter = document.getElementById('custDynamicFooter');
            if(custFooter) {
                custFooter.innerHTML = `
                    <div class="flex items-center gap-2"><i class="fas fa-users text-blue-400"></i> عدد العملاء المعروضين: ${filtered.length}</div>
                    <div class="flex items-center gap-2"><i class="fas fa-balance-scale text-blue-400"></i> إجمالي مديونية المعروض: <span class="${totalFDebt > 0 ? 'text-red-600' : 'text-emerald-700'}">${totalFDebt.toLocaleString()}</span></div>
                `;

        }

        function renderHRRows() {
            const search = document.getElementById('hrSearch')?.value.toLowerCase() || '';
            const areaF = document.getElementById('hrAreaFilter')?.value.toLowerCase() || '';
            
            let filtered = db.hr.filter(h => {
                const matchSearch = !search || String(h.name).toLowerCase().includes(search) || String(h.code).toLowerCase().includes(search) || String(h.area || '').toLowerCase().includes(search);
                const matchArea = !areaF || String(h.area || '').toLowerCase().includes(areaF);
                return matchSearch && matchArea;
            });

            // Sorting
            const sCol = window.sortHrCol;
            const sDir = window.sortHrDir;
            if (sCol) {
                filtered.sort((a, b) => {
                    let vA = a[sCol];
                    let vB = b[sCol];
                    if (!isNaN(parseFloat(vA)) && !isNaN(parseFloat(vB)) && String(vA).match(/^-?\d*\.?\d+$/)) {
                        return (parseFloat(vA) - parseFloat(vB)) * sDir;
                    }
                    return String(vA).localeCompare(String(vB)) * sDir;
                });
            }

            return filtered.map((h) => {
                const origIdx = db.hr.indexOf(h);
                // Calculate metrics

        function calculateBalance(customerName) {
            if (!db.sales || !db.returns || !db.payments) return "0";
            const sales = db.sales.filter(s => s.customerName === customerName).reduce((a, b) => a + parseFloat(b.total || 0), 0);
            const returns = db.returns.filter(s => s.customerName === customerName).reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            const payments = db.payments.filter(s => s.customerName === customerName).reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            return (sales - returns - payments).toLocaleString();
        }

        function calculatePrevBalanceForItem(customerName, cutoffTime) {
            // cutoffTime can be createdAt (ms) or date (YYYY-MM-DD)
            const cutoff = typeof cutoffTime === 'string' ? new Date(cutoffTime).getTime() : cutoffTime;
            
            const sales = db.sales.filter(s => s.customerName === customerName && (s.createdAt || new Date(s.date).getTime()) < cutoff)
                .reduce((a, b) => a + parseFloat(b.total || 0), 0);
            const returns = db.returns.filter(r => r.customerName === customerName && (r.createdAt || new Date(r.date).getTime()) < cutoff)
                .reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            const payments = db.payments.filter(p => p.customerName === customerName && (p.createdAt || new Date(p.date).getTime()) < cutoff)
                .reduce((a, b) => a + parseFloat(b.amount || 0), 0);
            
            return sales - returns - payments;
        }

        function renderStatementData(customerName) {
            const customer = db.customers.find(c => c.name === customerName);
            const fromD = document.getElementById('stmtFromDate')?.value;
            const toD = document.getElementById('stmtToDate')?.value;

            // Filter all transactions for this customer
            const allSales = db.sales.filter(s => s.customerName === customerName);
            const allReturns = db.returns.filter(r => r.customerName === customerName);
            const allPayments = db.payments.filter(p => p.customerName === customerName);

            // Calculate 'Previous Balance'
            let prevSales = 0, prevRet = 0, prevPay = 0;
            
            if (fromD) {
                prevSales = allSales.filter(s => s.date < fromD).reduce((a, b) => a + parseFloat(b.total || 0), 0);
                prevRet = allReturns.filter(r => r.date < fromD).reduce((a, b) => a + parseFloat(b.amount || 0), 0);
                prevPay = allPayments.filter(p => p.date < fromD).reduce((a, b) => a + parseFloat(p.amount || 0), 0);
                
                // ALSO move transactions made IN period that refer to old debt
                allReturns.forEach(r => {
                    if (r.date >= fromD && (String(r.notes).includes('سابق') || String(r.notes).includes('قديم'))) {
                        prevRet += parseFloat(r.amount || 0);
                    }
                });
                allPayments.forEach(p => {
                    if (p.date >= fromD && (String(p.notes).includes('سابق') || String(p.notes).includes('قديم') || String(p.notes).includes('رصيد'))) {
                        prevPay += parseFloat(p.amount || 0);
                    }
                });
            }
            const prevBalance = prevSales - prevRet - prevPay;

            // Apply Period Filters
            let sales = allSales;
            let returns = allReturns;
            let payments = allPayments;

            if (fromD) {
                sales = sales.filter(s => s.date >= fromD);
                returns = returns.filter(r => r.date >= fromD && !(String(r.notes).includes('سابق') || String(r.notes).includes('قديم')));
                payments = payments.filter(p => p.date >= fromD && !(String(p.notes).includes('سابق') || String(p.notes).includes('قديم') || String(p.notes).includes('رصيد')));
            }
            if (toD) {
                sales = sales.filter(s => s.date <= toD);
                returns = returns.filter(r => r.date <= toD);
                payments = payments.filter(p => p.date <= toD);
            }

            let allTransactions = [
                ...sales.map(s => ({ date: s.date, type: `فاتورة مبيعات`, details: s.invoiceNo || '', debit: parseFloat(s.total || 0), credit: 0, origItem: s })),
                ...returns.map(r => ({ date: r.date, type: `مرتجع مبيعات`, details: r.notes || '', debit: 0, credit: parseFloat(r.amount || 0), origItem: r })),
                ...payments.map(p => ({ date: p.date, type: `تحصيل / قبض`, details: p.no || '', debit: 0, credit: parseFloat(p.amount || 0), origItem: p }))
            ].sort((a, b) => new Date(a.date) - new Date(b.date));

            // Logic for splitting "Previous" vs "Period" vs "Unallocated"
            let runningBal = prevBalance;
            let periodSales = 0;
            let periodReturn = 0;
            let periodPayments = 0;

            const trsHtml = allTransactions.map(t => {
                if (t.debit > 0) periodSales += t.debit;
                if (t.credit > 0) {
                    if (t.type.includes('مرتجع')) periodReturn += t.credit;
                    else periodPayments += t.credit;
                }

                runningBal += (t.debit - t.credit);
                const rowType = t.type.includes('فاتورة') ? 'sales' : (t.type.includes('مرتجع') ? 'returns' : 'payments');
                const origItem = t.origItem;
                const origIndex = db[rowType].indexOf(origItem);
                const cleanDetails = String(t.details).replace('#', '');

                return `<tr class="hover:bg-blue-50/20 transition group border-b border-slate-100 cursor-pointer text-center" onclick="editItem('${rowType}', ${origIndex})">
                        <td class="px-2 py-1 border border-slate-300 col-date">${formatDate(t.date)}</td>
                        <td class="px-2 py-1 text-slate-900 border border-slate-300 text-right" style="width: 110px;">${t.type}</td>

                        <td class="px-2 py-1 border border-slate-300 col-val text-blue-700">${t.debit > 0 ? t.debit.toLocaleString() : '-'}</td>
                        <td class="px-2 py-1 border border-slate-300 col-val text-orange-600">${t.credit > 0 ? t.credit.toLocaleString() : '-'}</td>
                        <td class="px-2 py-1 border border-slate-300 col-val ${runningBal > 0 ? 'text-red-600' : 'text-emerald-700'}">${runningBal.toLocaleString()}</td>
                    </tr>`;
            }).join('');

            const finalBal = runningBal;

            document.getElementById('statementDataContainer').innerHTML = `
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-slate-50 border p-3 rounded-xl">
                            <span class="text-xs font-bold text-slate-500 block mb-1">رصيد سابق</span>
                            <span class="text-lg font-black text-slate-900">${prevBalance.toLocaleString()}</span>
                        </div>
                        <div class="bg-blue-50 border border-blue-100 p-3 rounded-xl">
                            <span class="text-xs font-bold text-blue-600 block mb-1">مبيعات الفترة (+)</span>
                            <span class="text-lg font-black text-blue-900">${periodSales.toLocaleString()}</span>
                        </div>
                        <div class="bg-orange-50 border border-orange-100 p-3 rounded-xl">
                            <span class="text-xs font-bold text-orange-600 block mb-1">مرتجعات الفترة (-)</span>
                            <span class="text-lg font-black text-orange-900">${periodReturn.toLocaleString()}</span>
                        </div>
                        <div class="bg-emerald-50 border border-emerald-100 p-3 rounded-xl">
                            <span class="text-xs font-bold text-emerald-600 block mb-1">تحصيلات الفترة (-)</span>
                            <span class="text-lg font-black text-emerald-900">${periodPayments.toLocaleString()}</span>
                        </div>
                    </div>

                    <div class="overflow-x-auto mt-4">
                        <table class="w-full text-sm text-right border-collapse print-table" id="statementTable">
                            <thead class="bg-slate-900 text-white font-bold">
                                <tr>
                                    <th class="p-2 border border-slate-700 col-date">التاريخ</th>
                                    <th class="p-2 border border-slate-700 text-right" style="width: 110px;">البيان</th>
                                    <th class="p-2 border border-slate-700 text-right col-details">تفاصيل المعاملة</th>
                                    <th class="p-2 border border-slate-700 text-center col-val">مدين (+)</th>
                                    <th class="p-2 border border-slate-700 text-center col-val">دائن (-)</th>
                                    <th class="p-2 border border-slate-700 text-left col-val">الرصيد الجاري</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${fromD ? `
                                <tr class="bg-slate-100 font-bold italic">
                                    <td class="p-2 border border-slate-300 text-center col-date">${formatDate(fromD)}</td>
                                    <td class="p-2 border border-slate-300 text-right">رصيد سابق</td>
                                    <td class="p-2 border border-slate-300 text-right col-details">مديونية سابقة حتى تاريخه</td>
                                    <td class="p-2 border border-slate-300 text-center col-val">${prevBalance > 0 ? prevBalance.toLocaleString() : '-'}</td>
                                    <td class="p-2 border border-slate-300 text-center col-val">${prevBalance < 0 ? Math.abs(prevBalance).toLocaleString() : '-'}</td>
                                    <td class="p-2 border border-slate-300 text-left col-val">${prevBalance.toLocaleString()}</td>
                                </tr>
                                ` : ''}
                                ${trsHtml}

                                <tr class="border-t-2 border-slate-400">
                                    <td colspan="5" class="p-4 text-right">صافي مديونية العميل (النهائية)</td>
                                    <td class="p-4 text-center text-red-500">${finalBal.toLocaleString()}</td>
                                </tr>

                    </div>
                </div>
            `;
        }

        function handleFileUpload(input, type) {
            const file = input.files[0];
            if (!file) return;

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    window.lastUploadedFile = e.target.result; // Base64
                    showToast('تم رفع الصورة بنجاح');
                };
                reader.readAsDataURL(file);
                return;
            }

            if (file.name.endsWith('.json')) {
                alert('يرجى استخدام زر الاستعادة في الإعدادات لملفات JSON');
                return;
            }

            if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                    json.forEach(row => {
                        const newId = type.charAt(0).toUpperCase() + Date.now().toString().slice(-4) + Math.floor(Math.random() * 100);
                        if (type === 'inventory') {
                            db.inventory.push({ no: row['رقم الصنف'] || newId, name: row['إسم الصنف'] || 'غير مسمى', price: parseFloat(row['السعر']) || 0, qty: parseInt(row['الكمية']) || 0, cost: parseFloat(row['التكلفة']) || 0, category: row['التصنيف'] || 'عام' });
                        } else if (type === 'customers') {
                            db.customers.push({ no: row['رقم العميل'] || newId, name: row['أسم العميل'] || 'عميل جديد', area: row['المنطقة'] || '', rep: row['المندوب'] || '', segment: row['الشريحة'] || 'C', paymentMethod: row['طريقة السداد'] || 'نقدي' });
                        } else if (type === 'sales') {
                            db.sales.push({ invoiceNo: row['رقم الفاتورة'] || newId, customerName: row['أسم العميل'] || 'غير معروف', total: parseFloat(row['الإجمالى']) || 0, date: row['التاريخ'] || new Date().toISOString().split('T')[0], createdBy: currentUser.id });
                        }
                    });
                    saveData();
                    showToast('تم استيراد البيانات بنجاح');
                    navigateTo(type);
                };
                reader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/') || file.type === 'application/pdf') {
                const reader = new FileReader();
                reader.onload = function(e) {
                    showToast('تم رفع الملف بنجاح كملحق (Base64)');
                    window.lastUploadedFile = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function downloadBackup() {
            const now = new Date();
            const dateStr = `${String(now.getDate()).padStart(2, '0')}-${String(now.getMonth() + 1).padStart(2, '0')}-${now.getFullYear()}`;
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).replace(':', '.');
            const fileName = `Backup Ibn Khaldon ${dateStr} ${timeStr}.json`;

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", fileName);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function restoreBackup(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    db = JSON.parse(e.target.result);
                    saveData();
                    alert('تم استعادة النسخة الاحتياطية بنجاح. سيتم إعادة تحميل الصفحة.');
                    location.reload();
                } catch (err) {
                    alert('ملف غير صالح');
                }
            };
            reader.readAsText(file);
        }

        function toggleAutoBackup() {
            const isChecked = document.getElementById('autoBackupToggle')?.checked || !db.settings.autoBackup;
            db.settings.autoBackup = isChecked;
            const statusLabel = document.getElementById('autoBackupStatus');
            if (statusLabel) statusLabel.innerText = isChecked ? 'مفعل' : 'غير مفعل';

            if (isChecked) {
                if (!autoBackupInterval) autoBackupInterval = setInterval(saveData, 5 * 60 * 1000);
                showToast('تم تفعيل النسخ التلقائي');
            } else {
                clearInterval(autoBackupInterval);
                autoBackupInterval = null;
            }
            saveData();
        }

        function checkAutoBackup() {
            if (db.settings.autoBackup) {
                const statusLabel = document.getElementById('autoBackupStatus');
                if (statusLabel) statusLabel.innerText = 'مفعل';
                const backupBtn = document.getElementById('autoBackupBtn');
                if (backupBtn) {
                    backupBtn.classList.replace('bg-green-100', 'bg-blue-100');
                    backupBtn.classList.replace('text-green-700', 'text-blue-700');
                }
                autoBackupInterval = setInterval(saveData, 5 * 60 * 1000);
            }
        }

        function buildFormFields(fieldsMapping) {
            return fieldsMapping.map(f => {
                const id = f.id || `field_${f.k}`;
                const valStr = f.val !== undefined && f.val !== null ? String(f.val).replace(/"/g, '&quot;') : '';
                const displayClass = f.hidden ? 'hidden' : 'mb-4';
                
                let inputHtml = '';
                if (f.t === 'textarea') {
                    inputHtml = `<textarea id="${id}" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition" rows="3" ${f.extra||''}>${valStr}</textarea>`;
                } else if (f.t === 'datalist') {
                    inputHtml = `
                        <input list="${f.list}" id="${id}" value="${valStr}" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition" ${f.extra||''}>
                        <datalist id="${f.list}">
                            ${f.options.map(o => `<option value="${String(o).replace(/"/g, '&quot;')}">`).join('')}
                        </datalist>
                    `;
                } else if(f.t === 'select') {
                    inputHtml = `
                        <select id="${id}" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition" ${f.extra||''}>
                            <option value="${valStr}">${valStr || 'أختر...'}</option>
                            ${(f.options||[]).map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                    `;
                } else if (f.t === 'file') {
                    inputHtml = `
                        <div class="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center hover:bg-slate-50 transition cursor-pointer" onclick="document.getElementById('${id}').click()">
                            <i class="fas fa-camera text-2xl text-slate-400 mb-2"></i>
                            <p class="text-xs text-slate-500">انقر لرفع صورة</p>
                            <input type="file" id="${id}" class="hidden" accept="image/*" onchange="handleFileUpload(this, '${type}')">
                        </div>
                    `;
                } else {
                    inputHtml = `<input type="${f.t}" id="${id}" value="${valStr}" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition" ${f.extra||''}>`;
                }

                return `
                    <div class="${displayClass}" ${f.wrapperId ? `id="${f.wrapperId}"` : ''}>
                        <label class="block text-sm font-bold text-slate-700 mb-1">${f.l}</label>
                        ${inputHtml}
                    </div>
                `;
            }).join('');
        }

        // Auto Fill Handlers
        function autoFillFromCustomer(custName) {
            const c = db.customers.find(x => x.name === custName);
            if (c) {
                const repEl = document.getElementById('field_rep');
                const areaEl = document.getElementById('field_area');
                const pEl = document.getElementById('field_paymentMethod');
                
                if (repEl) repEl.value = c.rep || '';
                if (areaEl) areaEl.value = c.area || '';
                if (pEl) pEl.value = c.paymentMethod || '';
            }
        }

        function quickActionFromInvoice(actionType, invoiceIndex) {
            const inv = db.sales[invoiceIndex];
            if(!inv) return;
            
            if(actionType === 'returns') {
                openModal('returns', null, { 
                    customerName: inv.customerName, 
                    invoiceRef: inv.invoiceNo 
                });
                setTimeout(() => {
                    populateCustomerInvoices(inv.customerName);
                    document.getElementById('field_invoiceRef').value = inv.invoiceNo;
                    if(document.getElementById('field_notes')) {
                        document.getElementById('field_notes').value = "مرتجع من فاتورة رقم " + inv.invoiceNo;
                    }
                    autoFillFromCustomer(inv.customerName); // FIX: Populate Rep and Area automatically
                }, 100);
            } else if(actionType === 'payments') {
                openModal('payments', null, { 
                    customerName: inv.customerName
                });
                setTimeout(() => {
                    populateCustomerPaymentOptions(inv.customerName);
                    const refEl = document.getElementById('field_paymentRef');
                    if(refEl) {
                        for (let i = 0; i < refEl.options.length; i++) {
                            if (refEl.options[i].value.includes(inv.invoiceNo)) {
                                refEl.selectedIndex = i;
                                autoFillPaymentNotes(refEl);
                                break;
                            }
                        }
                    }
                    autoFillFromCustomer(inv.customerName); // FIX: Populate Rep and Area automatically
                }, 100);
            }
        }

        function populateCustomerInvoices(custName) {
            const refEl = document.getElementById('field_invoiceRef');
            if(!refEl) return;
            
            // Get invoices for this customer
            const sales = [...db.sales].filter(s => s.customerName === custName);
            // Sort by date DESC (newest first)
            sales.sort((a,b) => new Date(b.date) - new Date(a.date));

            const getInvoiceBalance = (invNo) => {
                const sale = sales.find(s => s.invoiceNo === invNo);
                if(!sale) return 0;
                const rets = db.returns.filter(r => r.invoiceRef === invNo || r.invoiceNo === invNo).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                const pays = db.payments.filter(p => String(p.no).includes(invNo) || p.paymentRef === invNo).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                return parseFloat(sale.total||0) - rets - pays;
            };

            refEl.innerHTML = '<option value="">أختر الفاتورة...</option>' + 
                sales.map(s => `<option value="${s.invoiceNo}">${s.invoiceNo} (الإجمالي: ${parseFloat(s.total).toLocaleString()} - المتبقي: ${getInvoiceBalance(s.invoiceNo).toLocaleString()})</option>`).join('');
        }

        function populateCustomerClaims(custName) {
            const datalistEl = document.getElementById('claimsDatalist');
            if(!datalistEl) return;
            
            const sales = db.sales.filter(s => s.customerName === custName);
            const returns = db.returns.filter(r => r.customerName === custName);
            const payments = db.payments.filter(p => p.customerName === custName);

            const getInvoiceBalance = (invNo) => {
                const sale = sales.find(s => s.invoiceNo === invNo);
                if(!sale) return 0;
                const rets = returns.filter(r => r.invoiceRef === invNo).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                const pays = payments.filter(p => String(p.no).includes(invNo)).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                return parseFloat(sale.total||0) - rets - pays;
            };

            const unpaidInvoices = sales.filter(s => getInvoiceBalance(s.invoiceNo) > 0);
            const claims = db.claims.filter(s => s.customerName === custName);
            
            let html = claims.map(c => `<option value="${c.title} - ${c.amount}">`).join('');
            html += unpaidInvoices.map(s => `<option value="سداد فاتورة ${s.invoiceNo} (المتبقي: ${getInvoiceBalance(s.invoiceNo).toLocaleString()})">`).join('');
            html += '<option value="دفعة من الحساب - بدون مطالبة">';
            html += '<option value="من مطالبة">';
            
            datalistEl.innerHTML = html;
        }

        function populateCustomerPaymentOptions(custName) {
            const refEl = document.getElementById('field_paymentRef');
            if(!refEl) return;
            
            const sales = [...db.sales].filter(s => s.customerName === custName);
            sales.sort((a,b) => new Date(b.date) - new Date(a.date));

            const getInvoiceBalance = (invNo) => {
                const sale = sales.find(s => s.invoiceNo === invNo);
                if(!sale) return 0;
                const rets = db.returns.filter(r => r.invoiceRef === invNo || r.invoiceNo === invNo).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                const pays = db.payments.filter(p => String(p.no).includes(invNo) || p.paymentRef === invNo || (p.notes && p.notes.includes(invNo))).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                return parseFloat(sale.total||0) - rets - pays;
            };

            const unpaidInvoices = sales.filter(s => getInvoiceBalance(s.invoiceNo) > 1);
            const claims = [...db.claims].filter(s => s.customerName === custName && (s.status !== 'محصلة'));
            claims.sort((a,b) => new Date(b.date) - new Date(a.date));

            let html = '<option value="دفعة من الحساب">دفعة من الحساب</option>';
            if(unpaidInvoices.length > 0) {
                html += '<optgroup label="الفواتير المفتوحة (الأحدث أولاً)">';
                html += unpaidInvoices.map(s => `<option value="${s.invoiceNo}">فاتورة ${s.invoiceNo} (${s.date}) - متبقي: ${getInvoiceBalance(s.invoiceNo).toLocaleString()}</option>`).join('');
                html += '</optgroup>';
            }
            if(claims.length > 0) {
                html += '<optgroup label="المطالبات الأسبوعية">';
                html += claims.map(c => {
                    // Calculate paid for this claim
                    const paid = db.payments.filter(p => p.customerName === custName && p.paymentRef === c.id).reduce((a,b)=>a+parseFloat(b.amount||0), 0);
                    const rem = c.amount - paid;
                    return `<option value="${c.id}">مطالبة ${c.date} (${c.title}) - متبقي: ${rem.toLocaleString()}</option>`;
                }).join('');
                html += '</optgroup>';
            }
            refEl.innerHTML = html;
        }

        function autoFillPaymentNotes(selectEl) {
            const noField = document.getElementById('field_no');
            const amtField = document.getElementById('field_amount');
            if(!selectEl || !selectEl.value) return;

            const val = selectEl.value;
            const text = selectEl.options[selectEl.selectedIndex].text;

            if (noField) {
                if (val === 'دفعة من الحساب') {
                    noField.value = 'دفعة من الحساب';
                } else {
                    noField.value = text.split(' - ')[0]; // Take the title/no part
                }
            }

            // Optional: Auto-fill amount with the remaining balance
            if (amtField && val !== 'دفعة من الحساب') {
                const match = text.match(/متبقي: ([\d,.]+)/);
                if (match) {
                    const balance = parseFloat(match[1].replace(/,/g, ''));
                    amtField.value = balance;
                }
            }
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }

        function saveItem(type, index) {
            const isEdit = index !== null;
            const newItem = {};
            // Gather text/number/date fields and textareas
            const fields = document.querySelectorAll('#modalForm input:not([type="file"]), #modalForm select, #modalForm textarea');

            fields.forEach(field => {
                const key = field.id.replace('field_', '');
                let val = field.value;
                if (field.type === 'number') val = parseFloat(val) || 0;
                newItem[key] = val;
            });
            
            // إضافة توقيت الإنشاء لترتيب أدق
            if (!isEdit) newItem.createdAt = Date.now();
            else if (db[type][index] && db[type][index].createdAt) newItem.createdAt = db[type][index].createdAt;
            
            // Handle Image storage
            if (window.lastUploadedFile) {
                newItem.image = window.lastUploadedFile;
                window.lastUploadedFile = null; // Clear after use
            }

            // Add metadata if new
            if (!isEdit) {
                // Auto-Customer Logic
                if (['sales', 'returns', 'payments'].includes(type) && newItem.customerName) {
                    const existingCust = db.customers.find(c => c.name === newItem.customerName);
                    if (!existingCust) {
                        db.customers.push({
                            no: '', // يتم الإدخال يدوياً لاحقاً أو يترك فارغاً
                            name: newItem.customerName,
                            rep: newItem.rep || '',
                            area: newItem.area || '',
                            paymentMethod: newItem.paymentMethod || '',
                            date: new Date().toISOString().split('T')[0]
                        });
                    }
                }

                if (type === 'sales' || type === 'pharmacy_sales') newItem.createdBy = currentUser.id;
                db[type].push(newItem);

                // التعامل مع التسديد التلقائي من الفاتورة
                if (type === 'sales' && newItem.paid > 0) {
                    db.payments.push({
                        date: newItem.date,
                        customerName: newItem.customerName,
                        rep: newItem.rep,
                        area: newItem.area,
                        amount: newItem.paid,
                        no: `تسديد تلقائي من فاتورة ${newItem.invoiceNo}`,
                        notes: `تم الدفع عند إصدار الفاتورة رقم ${newItem.invoiceNo}`,
                        createdAt: Date.now() + 1 // ضمان وجوده بعد الفاتورة زمنياً بملي ثانية
                    });
                }
            } else {
                // If customers, auto-update historical forms
                if (type === 'customers') {
                    const oldName = db.customers[index].name;
                    const newName = newItem.name;
                    if (oldName !== newName) {
                        db.sales.forEach(s => { if(s.customerName === oldName) s.customerName = newName; });
                        db.returns.forEach(r => { if(r.customerName === oldName) r.customerName = newName; });
                        db.payments.forEach(p => { if(p.customerName === oldName) p.customerName = newName; });
                    }
                }
                db[type][index] = { ...db[type][index], ...newItem };
            }

            saveData();
            closeModal();
            showToast('تم حفظ البيانات بنجاح');
            
            // Re-render correct view
            if (['sales', 'returns', 'payments'].includes(type)) {
                renderAdvTableRows(type);
            } else if (type === 'areas') {
                renderAreasView(document.getElementById('contentArea'));
            } else if (type === 'paymentMethods') {
                renderPaymentMethodsView(document.getElementById('contentArea'));
            } else if (type === 'customers') {
                applyCustomerFilters();
            } else if (type === 'hr') {
                renderHRView(document.getElementById('contentArea'));
            } else {
                navigateTo(type);
            }
        }

        function shareData(type) {
            let data = [];
            let reportTitle = "";
            let summaryText = "";

            if (type === 'customers') {
                reportTitle = "العملاء";
                const rows = document.querySelectorAll('#customersTableBody tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 6) {
                        data.push({ code: cells[0].innerText, name: cells[1].innerText, rep: cells[2].innerText, debt: cells[5].innerText });
                    }
                });
                const footRow = document.querySelector('#custTfoot tr');
                if(footRow) summaryText = `\nإجمالي المديونية المعروض: ${footRow.querySelectorAll('td')[1].innerText}`;
            } else if (['sales', 'returns', 'payments'].includes(type)) {
                reportTitle = type === 'sales' ? 'المبيعات' : type === 'returns' ? 'المرتجعات' : 'التحصيل';
                const rows = document.querySelectorAll(`#advTbody_${type} tr`);
                rows.forEach(row => {
                    if(!row.classList.contains('hidden')) {
                       const cells = row.querySelectorAll('td');
                       if (cells.length >= 5) {
                          data.push({ c1: cells[0].innerText, c2: cells[1].innerText, c3: cells[2].innerText, val: cells[cells.length - 1].innerText });
                       }
                    }
                });
                const footRow = document.querySelector(`#advTfoot_${type} tr`);
                if(footRow) summaryText = `\nإجمالي القيمة: ${footRow.querySelectorAll('td')[1].innerText}`;
            }

            if (data.length === 0) { showToast("لا توجد بيانات للمشاركة"); return; }

            let text = `*شركة ابن خلدون لتجارة وتوزيع الأدوية*\n*تقرير ${reportTitle}*\n`;
            text += `بتاريخ: ${formatDate(new Date())}\n`;
            text += `--------------------------\n`;
            data.forEach(x => { text += `• ${Object.values(x).join(' | ')}\n`; });
            text += `--------------------------${summaryText}\n`;
            text += `شركة ابن خلدون لتجارة وتوزيع الأدوية`;

            const encoded = encodeURIComponent(text);
            const isWA = confirm("مشاركة عبر واتساب؟ (نعم لواتساب / لا لتليجرام)");
            const url = isWA ? `https://api.whatsapp.com/send?text=${encoded}` : `https://t.me/share/url?url=&text=${encoded}`;
            window.open(url, '_blank');
        }

            return labels[type] || type;
        }

        function exportToExcel(type) {
            const data = db[type];
            if (!data || data.length === 0) return showToast('لا توجد بيانات لتصديرها');
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, getTypeLabel(type));
            XLSX.writeFile(wb, `${getTypeLabel(type)}_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('تم تصدير الملف بنجاح');
        }

        function handleFileUpload(input, type) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    // Merging logic based on type
                    if (confirm(`هل أنت متأكد من استيراد ${json.length} سجل إلى ${getTypeLabel(type)}؟`)) {
                        db[type] = [...db[type], ...json];
                        saveData();
                        showToast('تم استيراد البيانات بنجاح');
                        navigateTo(type);
                    }
                } catch (err) {
                    console.error(err);
                    showToast('خطأ في قراءة الملف');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function shareCustomerStatement(name) {
            shareData('payments'); // Simplified placeholder
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            if(toast && msgEl) {
                msgEl.innerText = msg;
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
            }
        }
    </script>
</body>
